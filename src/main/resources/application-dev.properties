# Dev profile: run locally without MySQL

server.port=8081

# Load local dev-only secrets from a file in the project root (NOT committed)
spring.config.import=optional:file:./.env.dev.properties

spring.datasource.url=jdbc:h2:file:./data/devdb;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 console (optional for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Dev CORS (frontend dev servers)
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:5173

# Dev-only seeding (do NOT use in production)
app.dev.seed-admin.enabled=true
app.dev.seed-admin.email=admin@campus.local
app.dev.seed-admin.password=Admin@123
