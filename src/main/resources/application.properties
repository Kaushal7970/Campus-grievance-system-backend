spring.application.name=smart-campus-management

# ===============================
# DATABASE CONFIG (PostgreSQL)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${JDBC_DATABASE_USERNAME:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${JDBC_DATABASE_PASSWORD:}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# ===============================
# SERVER CONFIG (IMPORTANT)
# ===============================
server.port=${PORT:8080}

# --- CORS ---
app.cors.allowed-origins=https://*.onrender.com,https://campus-grievance-system-frontend.onrender.com,https://grievance-frontend.onrender.com,http://localhost:5173,http://localhost:3000,http://localhost:3001,http://localhost:3002

# --- JWT ---
app.jwt.issuer=${JWT_ISSUER:smart-campus}
app.jwt.secret=${JWT_SECRET:dev-only-change-me-to-a-strong-secret-32-bytes-min}
app.jwt.access-token-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:3600}

# --- Uploads ---
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# --- AI (OpenAI-compatible) ---
# Default provider is Gemini for this deployment; override via AI_PROVIDER.
app.ai.provider=${AI_PROVIDER:gemini}
app.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}
app.ai.openai.api-key=${OPENAI_API_KEY:}
app.ai.openai.model=${OPENAI_MODEL:gpt-4o-mini}

# --- AI (Gemini) ---
# Enable by setting AI_PROVIDER=gemini and GEMINI_API_KEY.
app.ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
app.ai.gemini.api-key=${GEMINI_API_KEY:${GOOGLE_API_KEY:}}
app.ai.gemini.model=${GEMINI_MODEL:gemini-1.5-flash}
app.ai.gemini.api-version=${GEMINI_API_VERSION:v1}

# --- Scheduling (escalation) ---
app.escalation.enabled=${ESCALATION_ENABLED:true}
app.escalation.faculty-days=${ESCALATION_FACULTY_DAYS:2}
app.escalation.hod-days=${ESCALATION_HOD_DAYS:4}
app.escalation.principal-days=${ESCALATION_PRINCIPAL_DAYS:7}
app.escalation.admin-days=${ESCALATION_ADMIN_DAYS:10}

logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}

# --- Security: account lockout ---
app.security.lockout.max-attempts=${LOCKOUT_MAX_ATTEMPTS:5}
app.security.lockout.minutes=${LOCKOUT_MINUTES:15}

# --- Admin bootstrap (override these in Render env) ---
app.seed-admin.enabled=${SEED_ADMIN_ENABLED:false}
app.seed-admin.email=${SEED_ADMIN_EMAIL:}
app.seed-admin.password=${SEED_ADMIN_PASSWORD:}

# --- SMS notifications (Twilio/Fast2SMS) ---
# Disabled by default to avoid accidental sends.
app.sms.enabled=${SMS_ENABLED:false}
app.sms.provider=${SMS_PROVIDER:noop}  # twilio | fast2sms | noop
app.sms.max-length=${SMS_MAX_LENGTH:160}
app.sms.max-attempts=${SMS_MAX_ATTEMPTS:3}

# Twilio REST API credentials
app.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.twilio.from-number=${TWILIO_FROM_NUMBER:}
app.sms.twilio.base-url=${TWILIO_BASE_URL:https://api.twilio.com}

# Fast2SMS credentials
app.sms.fast2sms.api-key=${FAST2SMS_API_KEY:}
app.sms.fast2sms.base-url=${FAST2SMS_BASE_URL:https://www.fast2sms.com}