# Test-only configuration
# - Uses in-memory H2 so `mvn test` doesn't depend on external DB env vars
# - Provides required JWT properties for JwtService bean

spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

app.jwt.issuer=test
# 32+ chars for HMAC-SHA key material
app.jwt.secret=test-secret-test-secret-test-secret-123456
app.jwt.access-token-ttl-seconds=3600

# --- SMS notifications (test defaults) ---
# Keep disabled in tests to avoid external HTTP calls.
app.sms.enabled=false
app.sms.provider=fast2sms
app.sms.max-length=160
app.sms.max-attempts=3

# Twilio placeholders
app.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.twilio.from-number=${TWILIO_FROM_NUMBER:}
app.sms.twilio.base-url=https://api.twilio.com

# Fast2SMS placeholders
app.sms.fast2sms.api-key=
app.sms.fast2sms.base-url=https://www.fast2sms.com
